<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex Regex Tester</title><style>body{font-family:sans-serif;margin:20px;background:#f8f8f8;color:#333}h1{color:#007bff}textarea{width:100%;min-height:100px;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:4px;box-sizing:border-box}#patterns-list{background:#fff;padding:15px;border-radius:5px;border:1px solid #eee}button{background:#007bff;color:#fff;padding:10px 15px;border:none;border-radius:4px;cursor:pointer}button:hover{background:#0056b3}.results-box{background:#e9ecef;padding:10px;margin-top:10px;border-radius:4px}</style></head><body><h1>Apex Regex Tester</h1><p>Test your regular expressions in real-time. Ad-free, simple, and fast.</p><h3>Input String:</h3><textarea id="inputString" placeholder="Enter your test string here..."></textarea><h3>Regex Pattern:</h3><textarea id="regexPattern" placeholder="e.g., ^\d{3}-\d{2}-\d{4}$"></textarea><h3>Results:</h3><div class="results-box" id="results"></div><h3>Common Patterns:</h3><div id="patterns-list"></div><button id="purchaseButton">Unlock Lifetime Access for $9.99</button><script>const inputString = document.getElementById('inputString'); const regexPattern = document.getElementById('regexPattern'); const resultsDiv = document.getElementById('results'); const patternsList = document.getElementById('patterns-list'); const purchaseButton = document.getElementById('purchaseButton'); const commonPatterns = [ { name: 'Email', pattern: '^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$', 'desc': 'Matches common email formats.' }, { name: 'URL', pattern: '^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$', 'desc': 'Matches typical URLs.' } ]; function testRegex() { try { const regex = new RegExp(regexPattern.value, 'g'); const str = inputString.value; const matches = [...str.matchAll(regex)]; if (matches.length > 0) { resultsDiv.innerHTML = `Found ${matches.length} match(es):<br>${matches.map(m => `- ${m[0]}`).join('<br>')}`; } else { resultsDiv.innerHTML = 'No matches found.'; } } catch (e) { resultsDiv.innerHTML = `<span style="color:red;">Error: ${e.message}</span>`; } } inputString.addEventListener('input', testRegex); regexPattern.addEventListener('input', testRegex); commonPatterns.forEach(p => { const div = document.createElement('div'); div.innerHTML = `<strong>${p.name}:</strong> <code>${p.pattern}</code> - ${p.desc}`; patternsList.appendChild(div); }); purchaseButton.addEventListener('click', () => alert('Stripe Checkout integration coming soon! This is a placeholder.')); testRegex();</script></body></html>
