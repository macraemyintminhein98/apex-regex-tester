<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Regex Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f7f7f7; color: #333; text-align: center; }
        h1 { color: #222; margin-bottom: 20px; }
        .container { display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; min-height: 120px; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; font-size: 16px; box-sizing: border-box; resize: vertical; outline: none; }
        textarea::placeholder { color: #aaa; }
        textarea:focus { border-color: #007bff; }
        .result { text-align: left; background-color: #e9f7ef; padding: 15px; border-radius: 6px; border: 1px solid #c8e6c9; min-height: 50px; white-space: pre-wrap; word-wrap: break-word; color: #2e7d32; font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; font-size: 16px; }
        .error { background-color: #fce4e4; border: 1px solid #ef9a9a; color: #c62828; }
        .highlight { background-color: #ffff00; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 17px; text-decoration: none; transition: background-color 0.2s ease; margin-top: 10px; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>⚡ Regex Tester</h1>
    <div class="container">
        <textarea id="regexInput" placeholder="Enter your regular expression (e.g., ^\d{3}-\d{2}-\d{4}$)"></textarea>
        <textarea id="textInput" placeholder="Enter text to test against (e.g., 123-45-6789)"></textarea>
        <div id="result" class="result">Matches will appear here.</div>
        <a href="#" class="btn" id="buyButton">Get Lifetime Access - $9.99</a>
    </div>
    <script>
        const regexInput = document.getElementById('regexInput');
        const textInput = document.getElementById('textInput');
        const resultDiv = document.getElementById('result');
        const buyButton = document.getElementById('buyButton');

        const testRegex = () => {
            const regexStr = regexInput.value;
            const textStr = textInput.value;

            if (!regexStr || !textStr) {
                resultDiv.className = 'result';
                resultDiv.textContent = 'Matches will appear here.';
                return;
            }
            try {
                const regex = new RegExp(regexStr, 'g');
                let matches = [];
                let match;
                while ((match = regex.exec(textStr)) !== null) {
                    matches.push({ value: match[0], index: match.index });
                }

                if (matches.length > 0) {
                    let highlightedText = '';
                    let lastIndex = 0;
                    matches.forEach(m => {
                        highlightedText += textStr.substring(lastIndex, m.index);
                        highlightedText += `<span class="highlight">${m.value}</span>`;
                        lastIndex = m.index + m.value.length;
                    });
                    highlightedText += textStr.substring(lastIndex);
                    resultDiv.className = 'result';
                    resultDiv.innerHTML = highlightedText;
                } else {
                    resultDiv.className = 'result';
                    resultDiv.textContent = 'No matches found.';
                }
            } catch (e) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `Error: ${e.message}`;
            }
        };

        regexInput.addEventListener('input', testRegex);
        textInput.addEventListener('input', testRegex);
        buyButton.addEventListener('click', () => alert('Stripe Checkout integration coming soon!'));
        testRegex(); 
    </script>
</body>
</html>
